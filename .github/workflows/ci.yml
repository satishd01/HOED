name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build Next.js app
        env:
          # Provide dummy values so Next.js can build without a real DB
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/syncscribe
          AUTH_SECRET: ci-build-secret-not-real
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_WS_URL: ws://localhost:1234
          GOOGLE_GENERATIVE_AI_API_KEY: dummy-key-for-build
        run: npm run build
